version: 1
formatters:
  simple:
    format: '%(threadName)s %(asctime)s - %(levelname)s - %(name)s.%(funcName)s() - %(message)s'
handlers:
  file:
    level: DEBUG
    class: logging.handlers.RotatingFileHandler
    formatter: simple
    filename: logs/kafka_client.log
    encoding: utf-8
    maxBytes: 1000000000  # 1GB
    backupCount: 1
loggers:
  __main__:
    level: DEBUG
    handlers: [file]
    propagate: no
  kafka_client:
    level: DEBUG
    handlers: [file]
    propagate: no
  message_bus:
    level: DEBUG
    handlers: [file]
    propagate: no
  nsp_client:
    level: DEBUG
    handlers: [file]
    propagate: no
root:
  level: INFO
  handlers: [file]